name: langues_oubliees
description: "Application Flutter éducative pour explorer les langues anciennes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^16.2.1
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  google_fonts: ^6.3.0
  flutter_animate: ^4.5.2
  flutter_tts: ^4.2.3
  characters: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/runes.json
